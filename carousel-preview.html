<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safu Wallet - TikTok Carousel 1</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #fff;
            padding: 20px;
        }
        h1 { text-align: center; margin-bottom: 30px; color: #a5b4fc; }
        .carousel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .slide {
            background: #0f0f1a;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .slide img {
            display: block;
            width: 300px;
            height: auto;
        }
        .slide-num {
            padding: 10px;
            text-align: center;
            font-size: 0.9rem;
            color: #888;
        }
        .info {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .info p { color: #888; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Safu Wallet - TikTok Carousel 1</h1>
    
    <div class="carousel">
        <div class="slide">
            <img src="carousel/01-hook.png" alt="Slide 1">
            <div class="slide-num">1 / 6</div>
        </div>
        <div class="slide">
            <img src="carousel/02-problem.png" alt="Slide 2">
            <div class="slide-num">2 / 6</div>
        </div>
        <div class="slide">
            <img src="carousel/03-solution.png" alt="Slide 3">
            <div class="slide-num">3 / 6</div>
        </div>
        <div class="slide">
            <img src="carousel/04-features.png" alt="Slide 4">
            <div class="slide-num">4 / 6</div>
        </div>
        <div class="slide">
            <img src="carousel/05-multichain.png" alt="Slide 5">
            <div class="slide-num">5 / 6</div>
        </div>
        <div class="slide">
            <img src="carousel/06-cta.png" alt="Slide 6">
            <div class="slide-num">6 / 6</div>
        </div>
    </div>
    
    <div class="info">
        <p><strong>TikTok Carousel - Ready for Review</strong></p>
        <p>Size: 1024x1536 (9:16 portrait)</p>
        <p>Text: "Your crypto wallet isn't as smart as you think" hook</p>
    </div>
</body>
</html>
